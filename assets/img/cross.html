<!DOCTYPE html>
<html style="height:100%">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
<title> 404 Not Found
</title><style>@media (prefers-color-scheme:dark){body{background-color:#000!important}}</style></head>
<body style="color: #444; margin:0;font: normal 14px/20px Arial, Helvetica, sans-serif; height:100%; background-color: #fff;">
<div style="height:auto; min-height:100%; ">     <div style="text-align: center; width:800px; margin-left: -400px; position:absolute; top: 30%; left:50%;">
        <h1 style="margin:0; font-size:150px; line-height:150px; font-weight:bold;">404</h1>
<h2 style="margin-top:20px;font-size: 30px;">Not Found
</h2>
<p>The resource requested could not be found on this server!</p>
</div></div>
    <script>
        const entrust_hamBtn = document.getElementById('entrust-ham-btn');
        const entrust_overlay = document.getElementById('entrust-overlay');

        function entrust_openMenu() {
            entrust_hamBtn.classList.add('entrust-is-open');
            entrust_overlay.classList.add('entrust-is-open');
            entrust_hamBtn.setAttribute('aria-expanded', 'true');
            document.body.style.overflow = 'hidden';
        }

        function entrust_closeMenu() {
            entrust_hamBtn.classList.remove('entrust-is-open');
            entrust_overlay.classList.remove('entrust-is-open');
            entrust_hamBtn.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }

        entrust_hamBtn.addEventListener('click', () => {
            entrust_overlay.classList.contains('entrust-is-open')
                ? entrust_closeMenu()
                : entrust_openMenu();
        });

        // Close on nav link click
        entrust_overlay.querySelectorAll('.entrust-overlay__links a').forEach(link => {
            link.addEventListener('click', entrust_closeMenu);
        });

        // Close on Escape
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') entrust_closeMenu();
        });
    </script>

</body></html>
